name: Release SnapParse

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (example: v1.0.0)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            Add-Content -Path $env:GITHUB_OUTPUT -Value "value=${{ inputs.release_tag }}"
          } else {
            Add-Content -Path $env:GITHUB_OUTPUT -Value "value=${{ github.ref_name }}"
          }

      - name: Validate version matches tag
        shell: pwsh
        run: |
          $pkgVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $releaseTag = "${{ steps.tag.outputs.value }}"
          $tagVersion = $releaseTag.TrimStart("v")
          if ($pkgVersion -ne $tagVersion) {
            throw "Version mismatch: package.json=$pkgVersion but tag=$releaseTag"
          }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri bundles
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Generate updater manifest (latest.json)
        env:
          UPDATER_REPOSITORY: ${{ github.repository }}
          UPDATER_TAG: ${{ steps.tag.outputs.value }}
        run: npm run updater:manifest

      - name: List bundle outputs
        shell: pwsh
        run: |
          Get-ChildItem -Recurse src-tauri/target/release/bundle | Select-Object FullName

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/latest.json
            src-tauri/target/release/bundle/msi/SnapParse_*.msi
            src-tauri/target/release/bundle/msi/SnapParse_*.msi.sig
            src-tauri/target/release/bundle/msi/SnapParse_*.msi.zip
            src-tauri/target/release/bundle/msi/SnapParse_*.msi.zip.sig
            src-tauri/target/release/bundle/nsis/SnapParse_*-setup.exe
            src-tauri/target/release/bundle/nsis/SnapParse_*-setup.exe.sig
            src-tauri/target/release/bundle/nsis/SnapParse_*-setup.nsis.zip
            src-tauri/target/release/bundle/nsis/SnapParse_*-setup.nsis.zip.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
